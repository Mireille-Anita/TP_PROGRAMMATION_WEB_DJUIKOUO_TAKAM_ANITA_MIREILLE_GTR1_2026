<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Contact - Mon mini-site</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Page de contact</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="présentation.html">Présentation</a>
            <a href="contact.html">Contact</a>
        </nav>
        <h2>Formulaire de contact</h2>
        <p>Veuillez remplir ce formulaire pour envoyer un message</p>
        <form>
            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" placeholder="Entrer votre nom" required>
            <br>
            <br>
            <label for="prénom">Prénom :</label>
            <input type="text" id="prénom" name="prénom" placeholder="Entrer votre pénom" required>
            <br>
            <br>
            <label for="email">Adresse email :</label>
            <input type="text" id="email" name="email" placeholder="exemple@email.com" required>
            <br>
            <br>
            <label for="téléphone">Téléphone</label>
            <input type="tel" id="téléphone" name="téléphone" placeholder="+237 6 XX XX XX XX">
            <br>
            <br>
            <label for="motif">Motif du message :</label>
            <select id="motif" name="motif" required>
                <option value="">-- Choisir un motif --</option>
                <option value="information">Demande d'information</option>
                <option value="stage">Demande de stage</option>
                <option value="projet">Proposition de projet</option>
                <option value="autre">Autre demande</option>
            </select>
            <br>
            <br>
            <p>Statut de visiteur :</p>
            <input type="radio" id="étudiant" name="statut" value="étudiant" required>
            <label for="étudiant">Etudiant</label>
            <br>
            <input type="radio" id="enseignant" name="statut" value="enseignant">
            <label for="enseignant"></label>Enseignant</label>
            <br>
            <input type="radio" id="profesionnel" name="statut" value="professionnel">
            <label for="professionnel">Professionnel</label>
            <br>
            <br>
            <label for="message">Message :</label>
            <br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="Ecrivez votre message ici" required></textarea>
            <br>
            <br>
            <input type="checkbox" id="confirmation" name="confirmation" required>
            <label for="confirmation">Je confirme que les informations saisies sont correctes</label>
            <br>
            <br>
            <label for="domaine d'intérêt">Domaine d'intérêt :
            </label>
            <select id="domaine" name="domaine" required>
                <option value="-- Choisir un domaine --"></option>
                <option value="réseaux informatique">Réseaux informatique</option>
                <option value="cybersécurité">Cybersécurité</option>
                <option value="administrateur-système">Administrateur-système</option>
                <option value="developpement web">Développement web</option>
            </select>
            <br>
            <br>
            <button type="submit">Envoyer</button>
            <button type="reset">Effacer</button>

        </form>
    </body>
</html>
